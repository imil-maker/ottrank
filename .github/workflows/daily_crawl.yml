name: OTT Ranking Crawler v2

on:
  schedule:
    - cron: '17 0 * * *'  # 매일 09:17 KST (UTC 00:17) - 정각 혼잡 회피
    - cron: '0 */2 * * *' # 2시간마다 (스케줄 확인용 임시)
  workflow_dispatch:        # 수동 실행 (Actions 탭에서 버튼으로 실행 가능)

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. 코드 체크아웃 ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 설치 ───────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. 의존성 설치 ───────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install playwright requests anthropic
          playwright install chromium
          playwright install-deps chromium

      # ── 4. D1 → 로컬 동기화 (⚠️ 절대 삭제 금지!) ───────────
      # Admin 수동 저장 데이터 + ott_categories 슬롯 설정 로컬 반영
      - name: Sync D1 data to local DB
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: |
          echo "=== D1 동기화 시작 ==="
          python sync_works.py
          echo "=== D1 동기화 완료 ==="

      # ── 5. 크롤링 실행 ───────────────────────────────────────
      - name: Run crawlers
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}

        run: |
          echo "=== 크롤링 시작 ==="
          python run_all.py
          echo "=== 크롤링 완료 ==="

      # ── 6. D1 직접 업로드 (wrangler-action 대체) ────────────
      # Python으로 D1 REST API 직접 호출 → 안정성 향상
      - name: Upload to Cloudflare D1
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: |
          echo "=== D1 업로드 시작 ==="
          python upload_to_d1.py
          echo "=== D1 업로드 완료 ==="

      # ── 7. rankings.db 커밋 ──────────────────────────────────
      - name: Commit rankings.db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rankings.db
          git diff --staged --quiet || git commit -m "chore: update rankings $(date +'%Y-%m-%d')"
          git push
