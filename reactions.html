<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해외반응 게시판 | 오뜨랑 — K-드라마·K-영화 해외반응 모음</title>
<meta name="description" content="K-드라마·K-영화 해외반응 영상과 번역 댓글을 오뜨랑에서 확인하세요. 외국인들의 실시간 반응을 한국어로 번역해 제공합니다.">
<meta property="og:title" content="해외반응 게시판 | 오뜨랑">
<meta property="og:description" content="K-드라마·K-영화 해외반응 영상과 번역 댓글 모음">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
:root {
  --bg:#0c0c10; --bg2:#13131a; --bg3:#1a1a24; --card:#16161f;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.16);
  --text:#ededf0; --muted:#7a7a96; --muted2:#a0a0bc;
  --accent:#e63946; --gold:#f0b429; --green:#34d399; --info:#378ADD;
  --font-sans:'Noto Sans KR',sans-serif;
  --font-mono:'DM Mono',monospace;
  --font-disp:'Bebas Neue',sans-serif;
  --r:10px; --r-lg:14px; --max-w:900px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:15px;line-height:1.6;overflow-x:hidden}

/* ── sticky 헤더 컨테이너 ── */
#ottrang-header{position:sticky;top:0;z-index:200}

/* ── 히어로 배너 ── */
.hero{
  background:linear-gradient(135deg,rgba(230,57,70,.15) 0%,rgba(55,138,221,.1) 50%,rgba(0,0,0,0) 100%);
  border-bottom:1px solid var(--border);
  padding:20px 28px 16px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 20% 50%,rgba(230,57,70,.08),transparent),
             radial-gradient(ellipse 40% 60% at 80% 30%,rgba(55,138,221,.06),transparent);
  pointer-events:none;
}
.hero-inner{max-width:900px;margin:0 auto;position:relative}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-family:var(--font-mono);letter-spacing:1.5px;
  color:var(--accent);border:.5px solid rgba(230,57,70,.4);
  padding:4px 12px;border-radius:20px;background:rgba(230,57,70,.08);
  margin-bottom:14px;
}
.hero-title{font-size:26px;font-weight:700;line-height:1.2;margin-bottom:6px}
.hero-title span{
  background:linear-gradient(90deg,#FF5177,#FF9A3C);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{font-size:13px;color:var(--muted2);margin-bottom:8px}
.hero-stats{display:flex;gap:20px;flex-wrap:wrap}
.hstat{text-align:center}
.hstat-num{font-size:22px;font-weight:700;font-family:var(--font-mono);color:var(--text)}
.hstat-label{font-size:11px;color:var(--muted);font-family:var(--font-mono)}

/* ── 필터 바 ── */
.filter-bar{
  position:sticky;top:64px;z-index:100;
  background:rgba(12,12,16,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.filter-inner{
  max-width:900px;margin:0 auto;
  padding:12px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.filter-btn{
  padding:6px 16px;border-radius:20px;border:.5px solid var(--border);
  background:transparent;color:var(--muted2);font-size:13px;cursor:pointer;
  font-family:var(--font-sans);transition:all .15s;white-space:nowrap;
}
.filter-btn.on{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.filter-btn:hover{background:var(--bg3);color:var(--text)}
.filter-search{
  margin-left:auto;display:flex;align-items:center;gap:8px;
}
.search-inp{
  background:var(--bg3);border:.5px solid var(--border);border-radius:20px;
  padding:7px 16px;color:var(--text);font-family:var(--font-sans);font-size:13px;
  outline:none;width:200px;transition:all .2s;
}
.search-inp:focus{border-color:var(--border2);width:260px}
.search-inp::placeholder{color:var(--muted)}

/* ── 메인 레이아웃 ── */
.page-wrap{max-width:900px;margin:0 auto;padding:16px 20px 60px}

/* ── 피처드 (최신 1개 큰 카드) ── */
.featured-card{
  display:grid;grid-template-columns:1fr 1fr;gap:0;
  background:var(--card);border:.5px solid var(--border);border-radius:var(--r-lg);
  overflow:hidden;margin-bottom:20px;cursor:pointer;transition:border-color .2s;
}
.featured-card:hover{border-color:var(--border2)}
.featured-thumb{position:relative;aspect-ratio:16/9;background:var(--bg3);overflow:hidden}
.featured-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.featured-card:hover .featured-thumb img{transform:scale(1.03)}
.featured-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.3);opacity:0;transition:opacity .2s;
}
.featured-card:hover .featured-play{opacity:1}
.play-icon{
  width:56px;height:56px;border-radius:50%;background:rgba(0,0,0,.85);
  display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;
}
.featured-new{
  position:absolute;top:12px;left:12px;
  background:var(--accent);color:#fff;font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:4px;font-family:var(--font-mono);letter-spacing:.5px;
}
.featured-info{padding:24px;display:flex;flex-direction:column;gap:12px}
.featured-work{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;color:var(--accent);font-family:var(--font-mono);
}
.featured-work img{width:32px;height:46px;object-fit:cover;border-radius:4px;background:var(--bg3)}
.featured-vtitle{font-size:26px;font-weight:800;line-height:1.25;margin-bottom:10px}
.featured-channel{font-size:13px;color:var(--muted2);display:flex;align-items:center;gap:6px}
.featured-meta{display:flex;gap:14px;font-size:12px;color:var(--muted);font-family:var(--font-mono)}
.featured-preview{
  background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r);
  padding:14px;font-size:13px;color:var(--muted2);line-height:1.65;flex:1;
}
.featured-preview-label{font-size:10px;color:var(--accent);font-family:var(--font-mono);letter-spacing:.5px;margin-bottom:8px}
.comment-preview{display:flex;flex-direction:column;gap:6px}
.cp-item{display:flex;gap:8px;font-size:12px;align-items:flex-start}
.cp-flag{font-size:14px;flex-shrink:0}
.cp-text{color:var(--muted2);line-height:1.4}
.featured-cta{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:8px;border-top:.5px solid var(--border);
}
.btn-view-reaction{
  padding:8px 18px;border-radius:var(--r);background:var(--accent);
  color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;
  font-family:var(--font-sans);transition:background .15s;
}
.btn-view-reaction:hover{background:#ff4d58}
.reaction-count{font-size:12px;color:var(--muted);font-family:var(--font-mono)}

/* ── 섹션 타이틀 ── */
.sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sec-title{font-size:18px;font-weight:700}
.sec-count{font-size:12px;color:var(--muted);font-family:var(--font-mono)}
.sec-more{margin-left:auto;font-size:13px;color:var(--info);cursor:pointer;font-family:var(--font-mono)}

/* ── 반응 카드 그리드 ── */
.reaction-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:16px;margin-bottom:32px;
}
.rc{
  background:var(--card);border:.5px solid var(--border);border-radius:var(--r-lg);
  overflow:hidden;cursor:pointer;transition:all .2s;
}
.rc:hover{border-color:var(--border2);transform:translateY(-2px)}
.rc-thumb{position:relative;aspect-ratio:16/9;background:var(--bg3);overflow:hidden}
.rc-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.rc:hover .rc-thumb img{transform:scale(1.04)}
.rc-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);opacity:0;transition:opacity .2s}
.rc:hover .rc-play{opacity:1}
.rc-play-icon{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.rc-badge{position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;font-family:var(--font-mono)}
.rc-badge.new{background:var(--accent);color:#fff}
.rc-badge.hot{background:var(--gold);color:#000}
.rc-body{padding:14px}
.rc-work-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rc-poster{width:28px;height:40px;border-radius:4px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.rc-work-name{font-size:11px;color:var(--accent);font-family:var(--font-mono);font-weight:500}
.rc-vtitle{font-size:18px;font-weight:700;line-height:1.3;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-channel{font-size:11px;color:var(--muted2);display:flex;align-items:center;gap:4px;margin-bottom:6px}
.rc-stats{display:flex;gap:10px;font-size:11px;color:var(--muted);font-family:var(--font-mono)}
.rc-comment-preview{
  margin-top:8px;padding:8px 10px;
  background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r);
  font-size:11px;color:var(--muted2);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.rc-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-top:.5px solid var(--border);
  font-size:11px;color:var(--muted);font-family:var(--font-mono);
}
.rc-footer-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--info-bg,rgba(55,138,221,.1));color:var(--info);
  border:.5px solid rgba(55,138,221,.3);padding:4px 10px;border-radius:6px;
  font-size:11px;font-family:var(--font-mono);cursor:pointer;transition:all .15s;
}
.rc-footer-btn:hover{background:rgba(55,138,221,.2)}

/* ── 인라인 플레이어 ── */
.player-modal{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.92);backdrop-filter:blur(8px);
  align-items:flex-start;justify-content:center;
  padding:20px;overflow-y:auto;
}
.player-modal.show{display:flex}
.player-wrap{
  width:100%;max-width:900px;background:var(--bg2);
  border:.5px solid var(--border2);border-radius:var(--r-lg);
  overflow:visible;display:flex;flex-direction:column;
  margin:auto;
}
.player-head{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;border-bottom:.5px solid var(--border);
  flex-shrink:0;
}
.player-title{font-size:14px;font-weight:500;flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.player-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:0;line-height:1;flex-shrink:0}
.player-close:hover{color:var(--text)}
.player-video{position:relative;width:100%;aspect-ratio:16/9}
.player-video iframe{width:100%;height:100%;border:none;display:block}
.player-body{flex:1;padding:18px}
.player-work-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:14px;border-bottom:.5px solid var(--border)}
.player-poster{width:36px;height:52px;border-radius:5px;object-fit:cover;background:var(--bg3)}
.player-work-name{font-size:14px;font-weight:600}
.player-work-sub{font-size:12px;color:var(--muted)}
.btn-goto-work{
  margin-left:auto;padding:7px 14px;border-radius:var(--r);
  background:var(--accent);color:#fff;border:none;font-size:12px;
  cursor:pointer;font-family:var(--font-sans);font-weight:600;white-space:nowrap;
}

/* ── 번역 댓글 ── */
.comments-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.comments-title{font-size:15px;font-weight:600}
.toggle-orig{font-size:11px;color:var(--info);cursor:pointer;font-family:var(--font-mono);margin-left:auto}
.translated-comments{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.tc-item{
  background:var(--bg3);border:.5px solid var(--border);border-radius:var(--r);
  padding:12px 14px;
}
.tc-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tc-flag{font-size:16px}
.tc-author{font-size:12px;font-weight:600;color:var(--text)}
.tc-likes{font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-left:auto}
.tc-sentiment{font-size:10px;padding:2px 7px;border-radius:10px;font-family:var(--font-mono)}
.tc-sentiment.positive{background:rgba(52,211,153,.1);color:var(--green);border:.5px solid rgba(52,211,153,.3)}
.tc-sentiment.negative{background:rgba(230,57,70,.1);color:var(--accent);border:.5px solid rgba(230,57,70,.3)}
.tc-sentiment.neutral{background:rgba(160,160,188,.1);color:var(--muted2);border:.5px solid var(--border)}
.tc-text{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:4px}
.tc-orig{font-size:11px;color:var(--muted);font-style:italic;display:none;margin-top:4px;padding-top:4px;border-top:.5px solid var(--border)}
.tc-orig.show{display:block}

/* ── 오뜨랑 사용자 댓글 ── */
.user-comments-section{margin-top:20px;padding-top:20px;border-top:.5px solid var(--border)}
.user-comment-input{
  background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r-lg);
  padding:16px;margin-bottom:16px;
}
.comment-input-row{display:flex;gap:8px;margin-bottom:8px}
.nick-inp{
  width:120px;background:var(--bg3);border:.5px solid var(--border);
  border-radius:var(--r);padding:8px 12px;color:var(--text);font-family:var(--font-sans);
  font-size:13px;outline:none;flex-shrink:0;
}
.nick-inp:focus{border-color:var(--border2)}
.content-inp{
  flex:1;background:var(--bg3);border:.5px solid var(--border);
  border-radius:var(--r);padding:8px 12px;color:var(--text);
  font-family:var(--font-sans);font-size:13px;outline:none;resize:none;height:60px;
}
.content-inp:focus{border-color:var(--border2)}
.comment-submit-row{display:flex;align-items:center;justify-content:space-between}
.spoiler-check{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer}
.btn-comment-submit{
  padding:8px 18px;border-radius:var(--r);background:var(--accent);
  color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;
  font-family:var(--font-sans);transition:background .15s;
}
.btn-comment-submit:hover{background:#ff4d58}
.user-comment-list{display:flex;flex-direction:column;gap:8px}
.uc-item{
  background:var(--bg3);border:.5px solid var(--border);
  border-radius:var(--r);padding:12px 14px;
}
.uc-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.uc-nick{font-size:13px;font-weight:600}
.uc-time{font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-left:auto}
.uc-text{font-size:13px;color:var(--muted2);line-height:1.6}
.uc-footer{display:flex;align-items:center;gap:8px;margin-top:8px}
.btn-uc-like{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;color:var(--muted);cursor:pointer;font-family:var(--font-mono);
  background:none;border:.5px solid var(--border);padding:3px 9px;border-radius:10px;
  transition:all .15s;
}
.btn-uc-like:hover{color:var(--accent);border-color:rgba(230,57,70,.4)}
.sp-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(230,57,70,.1);color:var(--accent);font-family:var(--font-mono)}
.empty-comments{padding:24px;text-align:center;font-size:13px;color:var(--muted)}

/* ── 로딩 / 빈 상태 ── */
.loading-grid{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:var(--muted);font-family:var(--font-mono)}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--info);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-state-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.empty-state-title{font-size:18px;font-weight:600;margin-bottom:8px;color:var(--muted2)}

/* ── 페이지네이션 ── */
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:20px 0}
.pg-btn{min-width:34px;height:34px;padding:0 8px;border-radius:var(--r);border:.5px solid var(--border);background:transparent;font-size:13px;color:var(--muted);cursor:pointer;font-family:var(--font-mono);display:flex;align-items:center;justify-content:center;transition:all .15s}
.pg-btn:hover{background:var(--bg3);color:var(--text)}
.pg-btn.on{background:var(--bg3);color:var(--text);border-color:var(--border2);font-weight:600}
.pg-btn:disabled{opacity:.3;cursor:default}

/* ── 토스트 ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(30,30,40,.95);color:#fff;font-size:13px;padding:11px 22px;border-radius:20px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .25s;font-family:var(--font-mono)}
.toast.show{opacity:1}

/* ── 반응형 ── */
@media(max-width:768px){
  .featured-card{grid-template-columns:1fr}
  .featured-info{padding:16px}
  .reaction-grid{grid-template-columns:1fr 1fr}
  .filter-search{width:100%}
  .hero{padding:24px 16px 20px}
  .hero-title{font-size:26px}
  .page-wrap{padding:16px 12px 60px}
  .player-wrap{border-radius:0}
}
@media(max-width:480px){
  .reaction-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- 공용 헤더 -->
<div id="ottrang-header"></div>

<!-- 히어로 배너 -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-badge">🌍 GLOBAL REACTION</div>
    <h1 class="hero-title">K-콘텐츠 <span>해외반응</span></h1>
    <p class="hero-sub">외국인들의 드라마·영화 반응을 한국어로 번역해서 전해드립니다</p>

  </div>
</div>

<!-- 필터 바 -->
<div class="filter-bar">
  <div class="filter-inner">
    <button class="filter-btn on" id="fAll"    onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn" id="fTV"     onclick="setFilter('tv',this)">드라마</button>
    <button class="filter-btn" id="fMovie"  onclick="setFilter('movie',this)">영화</button>
    <button class="filter-btn" id="fLatest" onclick="setSort('latest',this)">최신순</button>
    <button class="filter-btn" id="fHot"    onclick="setSort('hot',this)">인기순</button>
    <div class="filter-search">
      <input class="search-inp" type="text" placeholder="🔍 작품명 검색" oninput="onSearch(this.value)" id="searchInp">
    </div>
  </div>
</div>

<!-- 메인 콘텐츠 -->
<div class="page-wrap">

  <!-- 피처드 (최신 1개) -->
  <div id="featuredArea"></div>

  <!-- 전체 목록 -->
  <div class="sec-hd">
    <div class="sec-title">
      <i class="ti ti-brand-youtube" style="color:#ff0000;font-size:18px;vertical-align:-2px"></i>
      해외반응 영상
    </div>
    <div class="sec-count" id="totalCount"></div>
  </div>
  <div id="reactionGrid" class="reaction-grid">
    <div class="loading-grid" style="grid-column:1/-1">
      <div class="spinner"></div><span>불러오는 중…</span>
    </div>
  </div>
  <div id="pagination" class="pagination"></div>

</div>

<!-- 플레이어 모달 제거됨 - /reaction/:id 별도 페이지 사용 -->

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
/* ══ 헤더 삽입 ══ */
fetch('/header.html').then(r=>r.ok?r.text():Promise.reject())
  .then(h=>{document.getElementById('ottrang-header').innerHTML=h;if(typeof initHeader==='function')initHeader();})
  .catch(()=>{});

/* ══ 상수 ══ */
const API       = 'https://ottrank-api.tdidream.workers.dev';
const TMDB      = 'https://tmdb-proxy.tdidream.workers.dev/tmdb';
const IMG_W92   = 'https://image.tmdb.org/t/p/w92';
const IMG_W500  = 'https://image.tmdb.org/t/p/w500';
const PER_PAGE  = 12;

/* ══ 상태 ══ */
let allData     = [];    // 전체 반응 목록
let filtered    = [];    // 필터링된 목록
let curFilter   = 'all';
let curSort     = 'latest';
let curPage     = 1;
let searchQuery = '';
let showOrig    = false;
let curReactionId = null;

/* ══ 초기화 ══ */
async function init(){
  await loadReactions();
}

async function loadReactions(){
  try {
    const res  = await fetch(`${API}/reactions`);
    const json = await res.json();
    allData = json.data || [];



    /* 메인 지정 영상 피처드로 표시 */
    const featured = allData.find(r=>r.is_featured===1||r.is_featured==='1');
    if(featured) renderFeaturedItem(featured);

    applyFilter();
  } catch(e) {
    document.getElementById('reactionGrid').innerHTML =
      `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-state-icon">😞</div>
        <div class="empty-state-title">데이터를 불러올 수 없습니다</div>
      </div>`;
  }
}

/* ══ 필터·정렬 ══ */
function setFilter(f, btn){
  curFilter = f; curPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    if(['fAll','fTV','fMovie'].includes(b.id)) b.classList.remove('on');
  });
  btn.classList.add('on');
  applyFilter();
}
function setSort(s, btn){
  curSort = s; curPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    if(['fLatest','fHot'].includes(b.id)) b.classList.remove('on');
  });
  btn.classList.add('on');
  applyFilter();
}
function onSearch(q){
  searchQuery = q.trim(); curPage = 1; applyFilter();
}

function applyFilter(){
  let data = [...allData];

  /* 카테고리 필터 */
  /* 현재 reactions 테이블에 category가 없으므로 title_ko 기반으로 추후 개선 */

  /* 검색 */
  if(searchQuery){
    const q = searchQuery.toLowerCase();
    data = data.filter(r =>
      (r.title_ko||'').toLowerCase().includes(q) ||
      (r.video_title||'').toLowerCase().includes(q) ||
      (r.channel_name||'').toLowerCase().includes(q)
    );
  }

  /* 정렬 */
  if(curSort === 'hot'){
    data.sort((a,b) => (b.like_count||0) - (a.like_count||0) || (b.view_count||0) - (a.view_count||0));
  } else {
    data.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  }

  filtered = data;
  document.getElementById('totalCount').textContent = `${filtered.length}개`;
  renderFeatured();
  renderGrid();
  renderPagination();
}

/* ══ 피처드 카드 (메인 지정 영상 고정 표시) ══ */
function renderFeaturedItem(r){
  const el = document.getElementById('featuredArea');
  if(!r){ el.innerHTML=''; return; }
  _renderFeaturedCard(r, el);
}
function renderFeatured(){
  // 피처드 지정 영상 있으면 건너뜀 (renderFeaturedItem에서 처리)
  const hasFeatured = allData.some(r=>r.is_featured===1||r.is_featured==='1');
  if(hasFeatured) return;
  const el = document.getElementById('featuredArea');
  if(!filtered.length){ el.innerHTML = ''; return; }
  const r = filtered[0];
  _renderFeaturedCard(r, el);
}
function _renderFeaturedCard(r, el){

  const dateStr = r.published_at ? new Date(r.published_at).toLocaleDateString('ko-KR') : '';

  el.innerHTML = `
    <div class="featured-card" onclick="goReaction(${r.id})">
      <div class="featured-thumb">
        <img src="${r.thumbnail||`https://img.youtube.com/vi/${r.video_id}/mqdefault.jpg`}" alt="${r.video_title||''}" loading="eager">
        <div class="featured-play"><div class="play-icon"><i class="ti ti-player-play" style="font-size:18px"></i></div></div>
        <div class="featured-new">NEW</div>
      </div>
      <div class="featured-info">

        <div class="featured-vtitle">${r.custom_title||r.video_title||''}</div>
        <div class="featured-channel">
          <i class="ti ti-brand-youtube" style="color:#ff0000;font-size:14px"></i>
          ${r.channel_name||''}
        </div>
        <div class="featured-meta">
          ${r.view_count ? `<span>👁 ${Number(r.view_count).toLocaleString()}</span>` : ''}
          ${dateStr ? `<span>📅 ${dateStr}</span>` : ''}
        </div>
        <div class="featured-preview">
          <div class="featured-preview-label">🌍 해외 댓글 미리보기</div>
          <div class="comment-preview" id="featuredComments">
            <div style="font-size:12px;color:var(--muted)">영상을 클릭해서 번역 댓글을 확인하세요</div>
          </div>
        </div>
        <div class="featured-cta">
          <button class="btn-view-reaction" onclick="event.stopPropagation();goReaction(${r.id})">반응 보기 →</button>
        </div>
      </div>
    </div>`;

  /* 피처드 댓글 미리보기 로드 */
  loadFeaturedComments(r.id);
}

async function loadFeaturedComments(reactionId){
  try {
    const res  = await fetch(`${API}/reactions/${reactionId}/comments`);
    const json = await res.json();
    const data = json.data||[];
    const el   = document.getElementById('featuredComments');
    if(!el) return;
    if(!data.length){
      el.innerHTML = '<div style="font-size:12px;color:var(--muted2)">▶ 클릭해서 해외 번역 댓글 확인</div>';
      return;
    }
    /* 인기 댓글 1개 표시 */
    const top     = data[0];
    const preview = top.translated_text || top.original_text || '';
    el.innerHTML = `
      <div style="font-size:13px;color:var(--text);line-height:1.65;font-weight:500">
        "${preview.slice(0,90)}${preview.length>90?'…':''}"
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;font-family:var(--font-mono)">
        @${(top.author||'').replace(/^@/,'')} · 👍 ${Number(top.like_count||0).toLocaleString()}
        ${data.length>1?' &nbsp;·&nbsp; 외 '+(data.length-1)+'개 번역 댓글':''}
      </div>`;
  }catch(e){}
}

/* ══ 카드 그리드 ══ */
function renderGrid(){
  const el    = document.getElementById('reactionGrid');
  const start = (curPage-1)*PER_PAGE;
  const page  = filtered.slice(start, start+PER_PAGE);

  if(!filtered.length){
    el.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-state-icon">🌍</div>
      <div class="empty-state-title">아직 등록된 해외반응이 없습니다</div>
      <div style="font-size:13px;color:var(--muted);margin-top:8px">관리자 페이지에서 YouTube 영상을 등록해주세요</div>
    </div>`;
    return;
  }

  el.innerHTML = page.map((r,idx)=>{
    const isNew = idx + start < 3;
    const isHot = (r.view_count||0) > 100000;
    const thumb = r.thumbnail || `https://img.youtube.com/vi/${r.video_id}/mqdefault.jpg`;

    const dateStr = r.created_at ? new Date(r.created_at).toLocaleDateString('ko-KR') : '';

    return `
        <div class="rc" onclick="goReaction(${r.id})">
        <div class="rc-thumb">
          <img src="${thumb}" alt="${r.video_title||''}" loading="lazy" onerror="this.style.display='none'">
          <div class="rc-play"><div class="rc-play-icon"><i class="ti ti-player-play" style="font-size:12px"></i></div></div>
          ${isNew ? '<span class="rc-badge new">NEW</span>' : isHot ? '<span class="rc-badge hot">HOT</span>' : ''}
        </div>
        <div class="rc-body">

          <div class="rc-vtitle">${r.custom_title||r.video_title||''}</div>
          <div class="rc-channel">
            <i class="ti ti-brand-youtube" style="color:#ff0000;font-size:12px"></i>
            ${r.channel_name||''}
          </div>
          <div class="rc-stats">
            ${r.view_count ? `<span>👁 ${fmtNum(r.view_count)}</span>` : ''}
            <span>📅 ${dateStr}</span>
          </div>
        </div>
        <div class="rc-footer" style="gap:6px;flex-wrap:wrap">
          <button class="rc-footer-btn"
            style="background:rgba(230,57,70,.12);color:var(--accent);border-color:rgba(230,57,70,.35)"
            onclick="event.stopPropagation();goReaction(${r.id})">
            🌍 해외반응 댓글보기
          </button>
          <button class="rc-footer-btn"
            onclick="event.stopPropagation();goToWork(${r.tmdb_id},'${(r.title_ko||'').replace(/'/g,"\\'")}')">
            작품 상세 ↗
          </button>
        </div>
      </div>`;
  }).join('');
}

/* ══ 페이지네이션 ══ */
function renderPagination(){
  const total = Math.ceil(filtered.length/PER_PAGE);
  const el = document.getElementById('pagination');
  if(total<=1){el.innerHTML='';return;}
  let html = `<button class="pg-btn" onclick="goPage(${curPage-1})" ${curPage===1?'disabled':''}>‹</button>`;
  for(let p=1;p<=total;p++){
    if(total>7 && p>2 && p<total && Math.abs(p-curPage)>2) continue;
    html+=`<button class="pg-btn${p===curPage?' on':''}" onclick="goPage(${p})">${p}</button>`;
  }
  html+=`<button class="pg-btn" onclick="goPage(${curPage+1})" ${curPage===total?'disabled':''}>›</button>`;
  el.innerHTML=html;
}
function goPage(p){
  const total=Math.ceil(filtered.length/PER_PAGE);
  if(p<1||p>total)return;
  curPage=p;renderGrid();renderPagination();
  document.querySelector('.filter-bar').scrollIntoView({behavior:'smooth'});
}

/* ══ 반응 상세 페이지 이동 ══ */
function goReaction(id){
  sessionStorage.setItem('ottrang_reaction', JSON.stringify({id}));
  location.href = `/reaction/${id}`;
}

/* ══ 플레이어 (미사용 - 별도 페이지로 대체) ══ */
async function openPlayer(reactionId, videoId, title, tmdbId, titleKo, posterPath){
  curReactionId = reactionId;
  document.getElementById('playerTitle').textContent = title;
  document.getElementById('playerFrame').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
  document.getElementById('playerModal').classList.add('show');
  document.body.style.overflow = 'hidden';

  /* 플레이어 본문 로드 */
  const body = document.getElementById('playerBody');
  const poster = posterPath ? `${IMG_W500}${posterPath}` : '';
  body.innerHTML = `
    <div class="player-work-row" style="justify-content:flex-end">
      <button class="btn-goto-work" onclick="goToWork(${tmdbId},'${(titleKo||'').replace(/'/g,"\\'")}')">작품 상세 →</button>
    </div>

    <!-- 번역 댓글 -->
    <div class="comments-head">
      <div class="comments-title">🌍 해외 번역 댓글</div>
      <span class="toggle-orig" onclick="toggleOrig()">원문 보기</span>
    </div>
    <div class="translated-comments" id="translatedComments">
      <div class="loading-grid"><div class="spinner"></div><span>댓글 불러오는 중…</span></div>
    </div>

    <!-- 오뜨랑 사용자 댓글 -->
    <div class="user-comments-section">
      <div class="comments-head" style="margin-bottom:12px">
        <div class="comments-title">💬 오뜨랑 댓글 <small id="userCommentCount" style="font-size:12px;color:var(--muted);font-family:var(--font-mono)"></small></div>
      </div>
      <div class="user-comment-input">
        <div class="comment-input-row">
          <input class="nick-inp" id="nickInp" type="text" placeholder="닉네임" maxlength="20" value="익명">
          <textarea class="content-inp" id="contentInp" placeholder="이 영상에 대한 의견을 남겨보세요 (500자 이내)" maxlength="500"></textarea>
        </div>
        <div class="comment-submit-row">
          <label class="spoiler-check">
            <input type="checkbox" id="spoilerChk"> 스포일러 포함
          </label>
          <button class="btn-comment-submit" onclick="submitComment(${reactionId},${tmdbId})">등록</button>
        </div>
      </div>
      <div class="user-comment-list" id="userCommentList">
        <div class="loading-grid"><div class="spinner"></div></div>
      </div>
    </div>`;

  /* 번역 댓글 + 사용자 댓글 병렬 로드 */
  loadTranslatedComments(reactionId);
  loadUserComments(reactionId);
}

function handleModalClick(e){
  if(e.target === document.getElementById('playerModal')) closePlayer();
}
function closePlayer(){
  document.getElementById('playerFrame').src='';
  document.getElementById('playerModal').classList.remove('show');
  document.body.style.overflow='';
  curReactionId=null;
}

/* ══ 번역 댓글 ══ */
async function loadTranslatedComments(reactionId){
  const el = document.getElementById('translatedComments');
  if(!el) return;
  try{
    const res  = await fetch(`${API}/reactions/${reactionId}/comments`);
    const json = await res.json();
    const data = json.data||[];
    if(!data.length){
      el.innerHTML=`<div class="empty-comments" style="padding:24px;text-align:center">
        <div style="font-size:28px;margin-bottom:10px">🌍</div>
        <div style="font-size:14px;font-weight:600;margin-bottom:6px">번역 댓글 준비 중</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.6">
          관리자 페이지에서 💬 댓글수집 버튼을 눌러주세요<br>
          아래 오뜨랑 댓글로 먼저 반응을 남겨보세요! 👇
        </div>
      </div>`;
      return;
    }
    el.innerHTML = data.map(c=>`
      <div class="tc-item">
        <div class="tc-header">
          <span class="tc-author" style="font-weight:600">@${(c.author||'익명').replace(/^@/,'')}</span>
          <span class="tc-likes">👍 ${Number(c.like_count||0).toLocaleString()}</span>
        </div>
        <div class="tc-text">${c.translated_text||c.original_text||''}</div>
        ${c.original_text?`<div class="tc-orig" id="orig_${c.id}">${c.original_text}</div>`:''}
      </div>`).join('');
  }catch(e){
    el.innerHTML='<div class="empty-comments">댓글을 불러올 수 없습니다</div>';
  }
}

function toggleOrig(){
  showOrig=!showOrig;
  document.querySelectorAll('.tc-orig').forEach(el=>el.classList.toggle('show',showOrig));
  document.querySelector('.toggle-orig').textContent = showOrig?'번역 보기':'원문 보기';
}

/* ══ 사용자 댓글 ══ */
async function loadUserComments(reactionId){
  const el = document.getElementById('userCommentList');
  if(!el) return;
  try{
    const res  = await fetch(`${API}/reactions/${reactionId}/posts`);
    const json = await res.json();
    const data = json.data||[];
    const cntEl= document.getElementById('userCommentCount');
    if(cntEl) cntEl.textContent = `${data.length}개`;

    if(!data.length){
      el.innerHTML='<div class="empty-comments">첫 댓글을 남겨보세요!</div>';
      return;
    }
    el.innerHTML = data.map(c=>`
      <div class="uc-item">
        <div class="uc-header">
          <span class="uc-nick">${c.nickname||'익명'}</span>
          ${c.is_spoiler?'<span class="sp-badge">스포일러</span>':''}
          <span class="uc-time">${fmtTime(c.created_at)}</span>
        </div>
        <div class="uc-text">${c.content||''}</div>
        <div class="uc-footer">
          <button class="btn-uc-like" onclick="likeComment(${c.id})">
            ❤️ <span id="like_${c.id}">${c.like_count||0}</span>
          </button>
        </div>
      </div>`).join('');
  }catch(e){
    el.innerHTML='<div class="empty-comments">댓글을 불러올 수 없습니다</div>';
  }
}

async function submitComment(reactionId, tmdbId){
  const nick    = (document.getElementById('nickInp')?.value||'익명').trim();
  const content = (document.getElementById('contentInp')?.value||'').trim();
  const spoiler = document.getElementById('spoilerChk')?.checked||false;

  if(!content){ showToast('댓글 내용을 입력해주세요'); return; }

  try{
    const res  = await fetch(`${API}/reactions/${reactionId}/posts`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({nickname:nick,content,is_spoiler:spoiler,tmdb_id:tmdbId}),
    });
    const json = await res.json();
    if(json.ok){
      document.getElementById('contentInp').value='';
      showToast('댓글이 등록됐습니다! 🎉');
      loadUserComments(reactionId);
    } else {
      showToast('등록 실패: '+(json.message||''));
    }
  }catch(e){ showToast('오류: '+e.message); }
}

async function likeComment(postId){
  try{
    await fetch(`${API}/reactions/posts/${postId}/like`,{method:'POST'});
    const el=document.getElementById('like_'+postId);
    if(el) el.textContent=parseInt(el.textContent)+1;
  }catch(e){}
}

/* ══ 작품 상세페이지 이동 ══ */
async function goToWork(tmdbId, titleKo){
  if(!tmdbId){ showToast('작품 정보가 없습니다'); return; }
  try{
    /* TMDB에서 연도·시즌 조회 */
    let season=1, year=new Date().getFullYear(), type='tv';
    try{
      const tvRes = await fetch(`${TMDB}/tv/${tmdbId}?language=ko-KR`);
      const tvData= await tvRes.json();
      if(tvData.id){
        season = tvData.number_of_seasons||1;
        year   = (tvData.first_air_date||'').slice(0,4)||year;
        type   = 'tv';
      } else {
        const mvRes  = await fetch(`${TMDB}/movie/${tmdbId}?language=ko-KR`);
        const mvData = await mvRes.json();
        year = (mvData.release_date||'').slice(0,4)||year;
        type = 'movie';
      }
    }catch(e){}

    const slug = (titleKo||'work').replace(/\s+/g,'-').replace(/[^\uAC00-\uD7A3\uA960-\uA97F\u1100-\u11FF\u3130-\u318F\u0041-\u005A\u0061-\u007A\u0030-\u0039\-]/g,'');
    const url  = `/title/${slug}-${season}${year}${tmdbId}`;
    sessionStorage.setItem('ottrang_work', JSON.stringify({tmdb_id:tmdbId,type,platform:'',rank:'—',title:titleKo,season,year}));
    sessionStorage.setItem('ottrang_slug', url);
    window.open(url,'_blank');
  }catch(e){ showToast('이동 중 오류: '+e.message); }
}

/* ══ 유틸 ══ */
function fmtNum(n){ if(!n)return''; if(n>=10000)return Math.floor(n/10000)+'만'; return Number(n).toLocaleString(); }
function fmtTime(t){
  if(!t) return '';
  const d=new Date(t), now=new Date();
  const diff=Math.floor((now-d)/1000);
  if(diff<60) return '방금';
  if(diff<3600) return Math.floor(diff/60)+'분 전';
  if(diff<86400) return Math.floor(diff/3600)+'시간 전';
  return d.toLocaleDateString('ko-KR');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

/* 키보드 ESC로 플레이어 닫기 */
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closePlayer(); });

/* ══ 시작 ══ */
init();
</script>
</body>
</html>
