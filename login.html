<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — 오뜨랑</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0c0c10; --bg2:#13131a; --bg3:#1a1a24;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.16);
      --text:#ededf0; --muted:#7a7a96; --muted2:#a0a0bc;
      --accent:#e63946; --sans:'Noto Sans KR',sans-serif;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--text);
      font-family:var(--sans); min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:24px;
    }
    .card {
      background:var(--bg2); border:1px solid var(--border2);
      border-radius:16px; padding:40px 36px; width:100%; max-width:400px;
    }
    .logo {
      text-align:center; margin-bottom:28px;
    }
    .logo img { height:64px; width:auto; max-width:280px; object-fit:contain; border-radius:8px; }
    .logo-text {
      font-family:'Bebas Neue',sans-serif; font-size:28px;
      letter-spacing:2px; color:var(--text); line-height:1;
    }
    .logo-text span { color:var(--accent); }
    h1 {
      font-size:20px; font-weight:700; text-align:center;
      margin-bottom:8px;
    }
    .desc {
      font-size:14px; color:var(--muted2); text-align:center;
      margin-bottom:32px; line-height:1.6;
    }
    .btn-social {
      width:100%; height:52px; border-radius:10px;
      border:none; cursor:pointer; font-family:var(--sans);
      font-size:15px; font-weight:500;
      display:flex; align-items:center; justify-content:center; gap:10px;
      margin-bottom:12px; transition:opacity .15s;
      text-decoration:none;
    }
    .btn-social:hover { opacity:0.9; }
    .btn-kakao { background:#FEE500; color:#000; }
    .btn-naver { background:#03C75A; color:#fff; }
    .btn-google { background:#fff; color:#333; border:1px solid #ddd; }
    .btn-social img { width:22px; height:22px; object-fit:contain; }
    .divider {
      text-align:center; font-size:12px; color:var(--muted);
      margin:8px 0 4px;
    }
    .back {
      display:block; text-align:center; margin-top:20px;
      font-size:13px; color:var(--muted2); text-decoration:none;
    }
    .back:hover { color:var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/login-logo.jpg" alt="오뜨랑 OTTRANK"
        onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <div class="logo-text" style="display:none">오뜨랑<span>.</span></div>
    </div>
    <h1>로그인 / 가입</h1>
    <p class="desc">소셜 계정으로 간편하게 시작하세요</p>

    <a class="btn-social btn-kakao" href="https://ottrank-api.tdidream.workers.dev/auth/kakao">
      <img src="https://developers.kakao.com/assets/img/about/logos/kakaolink/kakaolink_btn_medium.png" alt="">
      카카오로 계속하기
    </a>

    <a class="btn-social btn-naver" href="https://ottrank-api.tdidream.workers.dev/auth/naver">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727z"/></svg>
      네이버로 계속하기
    </a>

    <a class="btn-social btn-google" href="https://ottrank-api.tdidream.workers.dev/auth/google">
      <svg width="22" height="22" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      구글로 계속하기
    </a>

    <a class="back" href="/">← 메인으로 돌아가기</a>
  </div>
</body>
</html>
