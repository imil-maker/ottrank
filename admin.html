<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오뜨랑 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c10; --bg2:#13131a; --bg3:#1a1a24; --card:#16161f;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.16);
  --text:#ededf0; --muted:#7a7a96; --muted2:#a0a0bc;
  --accent:#e63946; --gold:#f0b429; --green:#34d399; --red:#f87171;
  --mono:'DM Mono',monospace; --sans:'Noto Sans KR',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}

/* 헤더 */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;gap:16px}
.header h1{font-size:18px;font-weight:700}
.header .badge{font-family:var(--mono);font-size:11px;background:rgba(230,57,70,.15);color:var(--accent);border:1px solid rgba(230,57,70,.3);padding:3px 10px;border-radius:4px}

/* 로그인 */
.login-wrap{max-width:400px;margin:100px auto;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px}
.login-wrap h2{font-size:20px;margin-bottom:24px;text-align:center}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px 16px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;margin-bottom:12px}
.inp:focus{border-color:var(--accent)}
.btn{width:100%;padding:12px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer}
.btn:hover{opacity:.9}
.btn-sm{padding:6px 14px;border-radius:6px;border:none;font-family:var(--mono);font-size:12px;cursor:pointer;font-weight:500}
.btn-fix{background:rgba(240,180,41,.15);color:var(--gold);border:1px solid rgba(240,180,41,.3)}
.btn-fix:hover{background:rgba(240,180,41,.25)}
.btn-unfix{background:rgba(126,126,150,.1);color:var(--muted2);border:1px solid var(--border)}
.btn-unfix:hover{background:var(--bg3)}
.btn-save{background:var(--green);color:#000;padding:10px 24px;border-radius:8px;border:none;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer}
.btn-save:hover{opacity:.9}
.btn-cancel{background:transparent;color:var(--muted2);border:1px solid var(--border);padding:10px 20px;border-radius:8px;font-family:var(--sans);font-size:14px;cursor:pointer}

/* 메인 */
.main{max-width:1400px;margin:0 auto;padding:24px}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.toolbar label{font-size:13px;color:var(--muted2)}
.date-inp{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 12px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none}
.btn-load{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px 16px;border-radius:6px;font-family:var(--sans);font-size:13px;cursor:pointer}
.btn-load:hover{background:var(--bg2)}
.stat{font-family:var(--mono);font-size:12px;color:var(--muted);margin-left:auto}

/* 필터 탭 */
.filter-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.ftab{padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-size:13px;cursor:pointer}
.ftab.on{background:var(--bg3);color:var(--text);border-color:var(--border2)}

/* 테이블 */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:var(--bg3);padding:10px 14px;text-align:left;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.rank-num{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--gold);width:32px}
.poster-thumb{width:36px;height:54px;object-fit:cover;border-radius:4px;background:var(--bg3);display:block}
.poster-ph{width:36px;height:54px;border-radius:4px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px}
.title-ko{font-size:14px;font-weight:500;color:var(--text)}
.title-en{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.platform-badge{font-size:10px;padding:2px 8px;border-radius:3px;color:#fff;font-weight:600;font-family:var(--mono)}
.cat-badge{font-size:10px;padding:2px 8px;border-radius:3px;font-family:var(--mono);background:var(--bg3);color:var(--muted2)}
.tmdb-id{font-family:var(--mono);font-size:12px;color:var(--muted2)}
.tmdb-id a{color:#7ec8e3;text-decoration:none}
.tmdb-id a:hover{text-decoration:underline}
.manual-badge{font-size:10px;padding:2px 8px;border-radius:3px;background:rgba(240,180,41,.15);color:var(--gold);font-family:var(--mono);font-weight:600}
.no-tmdb{font-size:11px;color:var(--red);font-family:var(--mono)}

/* 수정 모달 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:28px;width:480px;max-width:95vw}
.modal h3{font-size:17px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.modal h3 .sub{font-size:13px;color:var(--muted);font-weight:400}
.form-row{margin-bottom:16px}
.form-row label{display:block;font-size:12px;color:var(--muted2);margin-bottom:6px;font-family:var(--mono)}
.form-row .inp{margin-bottom:0}
.form-hint{font-size:11px;color:var(--muted);margin-top:5px;font-family:var(--mono)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.poster-preview{display:flex;align-items:center;gap:12px;margin-top:8px}
.poster-preview img{width:50px;height:75px;object-fit:cover;border-radius:6px;background:var(--bg3)}
.poster-preview .no-poster{width:50px;height:75px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px}

/* 토스트 */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:12px 20px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

.empty{text-align:center;padding:60px;color:var(--muted)}
.loading{text-align:center;padding:40px;color:var(--muted);font-family:var(--mono)}

/* 페이지 탭 */
.page-tabs{display:flex;gap:2px;padding:0 28px;background:var(--bg2);border-bottom:1px solid var(--border)}
.page-tab{padding:12px 20px;font-size:14px;color:var(--muted2);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--sans);transition:all .15s}
.page-tab.on{color:var(--text);border-bottom-color:var(--accent)}
.page-tab:hover{color:var(--text)}

/* 해외반응 섹션 */
.reaction-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.yt-input-wrap{flex:1;min-width:280px;position:relative}
.yt-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 16px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none}
.yt-input:focus{border-color:var(--accent)}
.btn-yt-load{background:rgba(230,57,70,.15);color:var(--accent);border:1px solid rgba(230,57,70,.3);padding:10px 18px;border-radius:8px;font-size:14px;cursor:pointer;font-family:var(--sans);white-space:nowrap}
.btn-yt-load:hover{background:rgba(230,57,70,.25)}

/* 영상 미리보기 카드 */
.yt-preview{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:20px;display:none}
.yt-preview.show{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.yt-thumb-wrap{position:relative;width:200px;flex-shrink:0;border-radius:8px;overflow:hidden;background:var(--bg3)}
.yt-thumb-wrap img{width:100%;display:block}
.yt-thumb-wrap .yt-dur{position:absolute;bottom:5px;right:7px;background:rgba(0,0,0,.85);color:#fff;font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:3px}
.yt-info-wrap{flex:1;min-width:200px}
.yt-vtitle{font-size:15px;font-weight:600;margin-bottom:8px;line-height:1.4}
.yt-channel{font-size:12px;color:var(--muted2);margin-bottom:6px}
.yt-stats{display:flex;gap:12px;font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:12px;flex-wrap:wrap}
.yt-link-work{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.work-search-inp{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--sans);outline:none;width:220px}
.work-search-inp:focus{border-color:var(--border2)}
.work-search-results{position:absolute;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;z-index:50;width:300px;box-shadow:0 8px 24px rgba(0,0,0,.4);max-height:200px;overflow-y:auto}
.work-result-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;border-bottom:1px solid var(--border)}
.work-result-item:last-child{border-bottom:none}
.work-result-item:hover{background:var(--bg3)}
.work-result-poster{width:28px;height:40px;object-fit:cover;border-radius:3px;background:var(--bg3);flex-shrink:0}
.btn-yt-register{background:var(--green);color:#000;padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.btn-yt-register:disabled{opacity:.4;cursor:default}

/* 해외반응 목록 */
.reaction-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.reaction-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .15s}
.reaction-card:hover{border-color:var(--border2)}
.rc-thumb{position:relative;aspect-ratio:16/9;background:var(--bg3)}
.rc-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.rc-platform{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.8);color:#fff;font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:3px}
.rc-manual{position:absolute;top:7px;right:7px;background:rgba(240,180,41,.9);color:#000;font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:3px;font-weight:700}
.rc-body{padding:12px}
.rc-work{font-size:11px;color:var(--accent);font-family:var(--mono);margin-bottom:4px}
.rc-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-meta{font-size:11px;color:var(--muted);font-family:var(--mono);display:flex;gap:8px;flex-wrap:wrap}
.rc-footer{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--border)}
.btn-rc-del{background:rgba(230,57,70,.1);color:var(--accent);border:1px solid rgba(230,57,70,.2);padding:5px 12px;border-radius:5px;font-size:11px;cursor:pointer;font-family:var(--mono)}
.btn-rc-del:hover{background:rgba(230,57,70,.2)}
</style>
</head>
<body>

<div class="header">
  <h1>🎬 오뜨랑 관리자</h1>
  <span class="badge">ADMIN</span>
  <span id="logoutBtn" style="margin-left:auto;cursor:pointer;color:var(--muted);font-size:13px;display:none" onclick="logout()">로그아웃</span>
</div>
<div id="pageTabs" style="display:none">
  <div class="page-tabs">
    <button class="page-tab on" onclick="switchPage('ranking',this)">📊 랭킹 관리</button>
    <button class="page-tab" onclick="switchPage('reaction',this)">🌍 해외반응 관리</button>
  </div>
</div>

<!-- 로그인 -->
<div class="login-wrap" id="loginSection">
  <h2>🔐 관리자 로그인</h2>
  <input class="inp" type="password" id="tokenInp" placeholder="Admin Secret Token" onkeydown="if(event.key==='Enter')login()">
  <button class="btn" onclick="login()">로그인</button>
</div>

<!-- 메인 -->
<div class="main" id="mainSection" style="display:none">
  <div class="toolbar">
    <label>날짜</label>
    <input type="date" class="date-inp" id="dateInp">
    <button class="btn-load" onclick="loadData()">불러오기</button>
    <span class="stat" id="statTxt"></span>
  </div>

  <div class="filter-tabs" id="filterTabs">
    <button class="ftab on" onclick="setFilter('all',this)">전체</button>
    <button class="ftab" onclick="setFilter('netflix',this)">넷플릭스</button>
    <button class="ftab" onclick="setFilter('tving',this)">티빙</button>
    <button class="ftab" onclick="setFilter('disney',this)">디즈니+</button>
    <button class="ftab" onclick="setFilter('coupang',this)">쿠팡플레이</button>
    <button class="ftab" onclick="setFilter('wavve',this)">웨이브</button>
    <button class="ftab" onclick="setFilter('boxoffice',this)">박스오피스</button>
    <button class="ftab" style="margin-left:auto;border-color:rgba(247,129,113,.3);color:var(--red)" onclick="setFilter('no_tmdb',this)">⚠ TMDB없음</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>순위</th>
          <th>포스터</th>
          <th>제목</th>
          <th>플랫폼</th>
          <th>카테고리</th>
          <th>TMDB ID</th>
          <th>상태</th>
          <th>수정</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8" class="loading">날짜를 선택하고 불러오기를 클릭하세요</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 해외반응 관리 섹션 -->
<div id="reactionSection" class="main" style="display:none">

  <!-- YouTube URL 입력 -->
  <div class="reaction-toolbar">
    <div class="yt-input-wrap">
      <input class="yt-input" id="ytUrlInp" type="text"
        placeholder="YouTube URL 입력  예) https://www.youtube.com/watch?v=abc123"
        oninput="onYtUrlInput(this.value)">
    </div>
    <button class="btn-yt-load" onclick="fetchYtInfo()">영상 정보 가져오기</button>
  </div>

  <!-- YouTube 영상 미리보기 + 작품 연결 -->
  <div class="yt-preview" id="ytPreview">
    <div class="yt-thumb-wrap">
      <img id="ytThumbImg" src="" alt="">
    </div>
    <div class="yt-info-wrap">
      <div class="yt-vtitle" id="ytVtitle"></div>
      <div class="yt-channel" id="ytChannel"></div>
      <div class="yt-stats">
        <span id="ytViews"></span>
        <span id="ytLikes"></span>
        <span id="ytDate"></span>
      </div>

      <!-- 관리자 제목 입력 -->
      <div style="font-size:12px;color:var(--muted2);margin-bottom:6px;font-family:var(--mono)">게시판 제목 <span style="color:var(--accent)">*</span> <span style="color:var(--muted);font-size:10px">(직접 입력, 미입력 시 영상 제목 사용)</span></div>
      <input class="work-search-inp" id="customTitleInp" type="text" placeholder="예) 원더풀스 1화 외국인 반응 모음" maxlength="100" style="width:100%;margin-bottom:12px">

      <!-- 작품 연결 -->
      <div style="font-size:12px;color:var(--muted2);margin-bottom:6px;font-family:var(--mono)">연결할 작품 검색 <span style="color:var(--muted);font-size:10px">(작품명 또는 tmdb_id 입력)</span></div>
      <div class="yt-link-work" style="position:relative">
        <input class="work-search-inp" id="workSearchInp" type="text"
          placeholder="작품명 검색..."
          oninput="searchWorks(this.value)"
          autocomplete="off">
        <div class="work-search-results" id="workSearchResults" style="display:none;position:absolute;top:38px;left:0"></div>
        <div id="selectedWork" style="font-size:13px;color:var(--green);font-family:var(--mono)"></div>
      </div>

      <button class="btn-yt-register" id="btnRegister" onclick="registerReaction()" disabled>
        ✅ 등록하기
      </button>
    </div>
  </div>

  <!-- 등록된 해외반응 목록 -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
    <div style="font-size:15px;font-weight:600">등록된 해외반응</div>
    <div class="stat" id="reactionStat"></div>
    <button class="btn-load" onclick="loadReactions()" style="margin-left:auto">새로고침</button>
  </div>
  <div class="reaction-list" id="reactionList">
    <div class="loading">불러오는 중...</div>
  </div>
</div>

<!-- 수정 모달 -->
<div class="overlay" id="editOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>✏️ 수동 수정 <span class="sub" id="modalSub"></span></h3>
    <input type="hidden" id="editId">

    <div class="form-row">
      <label>한국어 제목</label>
      <input class="inp" type="text" id="editTitleKo" placeholder="예: 넘버원">
    </div>

    <div class="form-row">
      <label>TMDB ID</label>
      <input class="inp" type="number" id="editTmdbId" placeholder="예: 1411577" oninput="previewPoster()">
      <div class="form-hint">themoviedb.org/movie/[ID] 에서 확인</div>
      <div class="poster-preview" id="posterPreview">
        <div class="no-poster">🎬</div>
        <span style="font-size:12px;color:var(--muted)">TMDB ID 입력 시 포스터 미리보기</span>
      </div>
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEdit()">저장 (수동고정)</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://ottrank-api.tdidream.workers.dev';
const IMG = 'https://image.tmdb.org/t/p/w500';
const PC = {netflix:'#e50914',tving:'#ff153c',disney:'#06b6d4',coupang:'#1ac44d',wavve:'#0070f3',boxoffice:'#f0b429'};

let token = '';
let allData = [];
let curFilter = 'all';

function login() {
  const t = document.getElementById('tokenInp').value.trim();
  if (!t) return;
  token = t;
  localStorage.setItem('admin_token', t);
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('mainSection').style.display = 'block';
  document.getElementById('logoutBtn').style.display = 'block';
  document.getElementById('pageTabs').style.display = 'block';
  // 오늘 날짜 기본 세팅
  document.getElementById('dateInp').value = new Date().toISOString().slice(0,10);
  loadData();
  loadReactions();
}

function logout() {
  token = '';
  localStorage.removeItem('admin_token');
  location.reload();
}

// 저장된 토큰 자동 로그인
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('admin_token');
  if (saved) { document.getElementById('tokenInp').value = saved; login(); }
});

async function loadData() {
  const date = document.getElementById('dateInp').value;
  document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" class="loading">불러오는 중...</td></tr>';
  try {
    const url = date ? `${API}/admin/rankings?date=${date}` : `${API}/admin/rankings`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401) { showToast('인증 실패. 토큰을 확인하세요.', 'err'); return; }
    const json = await res.json();
    allData = json.data || [];
    document.getElementById('statTxt').textContent = `총 ${allData.length}개`;
    renderTable();
  } catch(e) {
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" class="empty">오류: ${e.message}</td></tr>`;
  }
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderTable();
}

function renderTable() {
  let rows = allData;
  if (curFilter === 'no_tmdb') rows = rows.filter(r => !r.tmdb_id);
  else if (curFilter !== 'all') rows = rows.filter(r => r.platform === curFilter);

  if (!rows.length) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" class="empty">데이터 없음</td></tr>';
    return;
  }

  document.getElementById('tableBody').innerHTML = rows.map(r => `
    <tr>
      <td><span class="rank-num">${r.rank}</span></td>
      <td>${r.poster_path
        ? `<img class="poster-thumb" src="${IMG+r.poster_path}" alt="" loading="lazy">`
        : `<div class="poster-ph">🎬</div>`
      }</td>
      <td>
        <div class="title-ko">${r.title_ko}</div>
        <div class="title-en">${r.title_en || ''}</div>
      </td>
      <td><span class="platform-badge" style="background:${PC[r.platform]||'#888'}">${r.platform}</span></td>
      <td><span class="cat-badge">${r.category}</span></td>
      <td>
        ${r.tmdb_id
          ? `<span class="tmdb-id"><a href="https://www.themoviedb.org/${r.category==='tv'?'tv':'movie'}/${r.tmdb_id}" target="_blank">${r.tmdb_id}</a></span>`
          : `<span class="no-tmdb">미등록</span>`
        }
      </td>
      <td>${r.is_manual ? '<span class="manual-badge">🔒 수동고정</span>' : ''}</td>
      <td style="display:flex;gap:6px;align-items:center">
        <button class="btn-sm btn-fix" onclick='openModal(${JSON.stringify(r)})'>수정</button>
        ${r.is_manual ? `<button class="btn-sm btn-unfix" onclick="unfix(${r.id})">고정해제</button>` : ''}
      </td>
    </tr>
  `).join('');
}

function openModal(r) {
  document.getElementById('editId').value = r.id;
  document.getElementById('editTitleKo').value = r.title_ko;
  document.getElementById('editTmdbId').value = r.tmdb_id || '';
  document.getElementById('modalSub').textContent = `${r.platform} · ${r.category} · ${r.rank}위`;
  updatePosterPreview(r.poster_path);
  document.getElementById('editOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('editOverlay').classList.remove('show');
}

let previewTimer = null;
function previewPoster() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(() => {
    const tmdbId = document.getElementById('editTmdbId').value;
    if (!tmdbId) { updatePosterPreview(null); return; }
    // 미리보기: TMDB 이미지 직접 시도 (tmdb_id로 검색)
    fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?language=ko-KR`, {
      headers: { Authorization: 'Bearer eyJhbGc...' } // 프록시 사용
    }).catch(() => {});
    // 프록시로 조회
    fetch(`${API}/admin/rankings`, { headers: { Authorization: `Bearer ${token}` } })
      .catch(() => {});
  }, 800);
}

function updatePosterPreview(posterPath) {
  const el = document.getElementById('posterPreview');
  if (posterPath) {
    el.innerHTML = `<img src="${IMG+posterPath}" style="width:50px;height:75px;object-fit:cover;border-radius:6px">
      <span style="font-size:12px;color:var(--muted2)">현재 포스터</span>`;
  } else {
    el.innerHTML = `<div class="no-poster">🎬</div>
      <span style="font-size:12px;color:var(--muted)">저장 시 TMDB ID로 자동 조회</span>`;
  }
}

async function saveEdit() {
  const id = document.getElementById('editId').value;
  const title_ko = document.getElementById('editTitleKo').value.trim();
  const tmdb_id = parseInt(document.getElementById('editTmdbId').value) || null;

  try {
    const res = await fetch(`${API}/admin/fix`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ id: parseInt(id), title_ko, tmdb_id })
    });
    const json = await res.json();
    if (json.ok) {
      showToast('저장 완료! 수동고정 설정됨 🔒', 'ok');
      closeModal();
      loadData();
    } else {
      showToast('저장 실패: ' + json.message, 'err');
    }
  } catch(e) {
    showToast('오류: ' + e.message, 'err');
  }
}

async function unfix(id) {
  if (!confirm('수동고정을 해제하면 다음 크롤링 시 자동으로 덮어씁니다. 해제할까요?')) return;
  try {
    const res = await fetch(`${API}/admin/unfix`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ id })
    });
    const json = await res.json();
    if (json.ok) { showToast('고정 해제됨', 'ok'); loadData(); }
  } catch(e) { showToast('오류', 'err'); }
}

/* ══════════════════════════════════════════════
   페이지 탭 전환
══════════════════════════════════════════════ */
function switchPage(page, btn) {
  document.querySelectorAll('.page-tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('mainSection').style.display    = page === 'ranking'  ? 'block' : 'none';
  document.getElementById('reactionSection').style.display = page === 'reaction' ? 'block' : 'none';
}

/* ══════════════════════════════════════════════
   해외반응 관리 — YouTube
══════════════════════════════════════════════ */
const TMDB_PROXY = 'https://tmdb-proxy.tdidream.workers.dev/tmdb';
const IMG2 = 'https://image.tmdb.org/t/p/w92';
let ytVideoData = null;   // 현재 미리보기 중인 YouTube 영상 데이터
let selectedWorkData = null; // 연결할 작품

/* YouTube URL에서 video_id 추출 */
function extractVideoId(url) {
  if (!url) return null;
  // watch?v=, youtu.be/, embed/, shorts/ 형식 모두 지원
  const m = url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function onYtUrlInput(val) {
  const vid = extractVideoId(val);
  if (!vid) {
    document.getElementById('ytPreview').classList.remove('show');
    ytVideoData = null;
  }
}

/* YouTube oEmbed API로 영상 정보 가져오기 (API 키 불필요) */
async function fetchYtInfo() {
  const url = document.getElementById('ytUrlInp').value.trim();
  const videoId = extractVideoId(url);
  if (!videoId) { showToast('올바른 YouTube URL을 입력해주세요', 'err'); return; }

  showToast('영상 정보 가져오는 중...', 'ok');
  try {
    /* oEmbed로 제목·채널 가져오기 */
    const oembed = await fetch(
      `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`
    );
    if (!oembed.ok) throw new Error('영상을 찾을 수 없습니다');
    const od = await oembed.json();

    ytVideoData = {
      video_id:     videoId,
      video_title:  od.title || '',
      channel_name: od.author_name || '',
      thumbnail:    `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
      view_count:   0,
      like_count:   0,
      published_at: new Date().toISOString(),
    };

    /* 미리보기 표시 */
    document.getElementById('ytThumbImg').src    = ytVideoData.thumbnail;
    document.getElementById('ytVtitle').textContent   = ytVideoData.video_title;
    document.getElementById('ytChannel').textContent  = '📺 ' + ytVideoData.channel_name;
    document.getElementById('ytViews').textContent    = '조회수 정보 없음';
    document.getElementById('ytLikes').textContent    = '';
    document.getElementById('ytDate').textContent     = '';
    document.getElementById('ytPreview').classList.add('show');
    document.getElementById('workSearchInp').focus();
    showToast('영상 정보를 가져왔습니다!', 'ok');
  } catch(e) {
    showToast('오류: ' + e.message, 'err');
  }
}

/* 작품 검색 — TMDB 검색 (랭킹 없는 작품도 가능) */
let workSearchTimer = null;
async function searchWorks(q) {
  clearTimeout(workSearchTimer);
  const el = document.getElementById('workSearchResults');
  if (!q || q.length < 1) { el.style.display = 'none'; return; }

  workSearchTimer = setTimeout(async () => {
    try {
      /* tmdb_id 직접 입력 시 바로 조회 */
      if (/^\d{3,8}$/.test(q)) {
        const [tvRes, mvRes] = await Promise.all([
          fetch(`${TMDB_PROXY}/tv/${q}?language=ko-KR`),
          fetch(`${TMDB_PROXY}/movie/${q}?language=ko-KR`),
        ]);
        const tvD = await tvRes.json();
        const mvD = await mvRes.json();
        const rows = [];
        if (tvD.id) rows.push({ tmdb_id: tvD.id, title_ko: tvD.name||tvD.original_name||'', poster_path: tvD.poster_path||'', category:'tv', year:(tvD.first_air_date||'').slice(0,4) });
        if (mvD.id) rows.push({ tmdb_id: mvD.id, title_ko: mvD.title||mvD.original_title||'', poster_path: mvD.poster_path||'', category:'movie', year:(mvD.release_date||'').slice(0,4) });
        if (rows.length) {
          const el = document.getElementById('workSearchResults');
          el.innerHTML = rows.map(r => `
            <div class="work-result-item" onclick="selectWork(${JSON.stringify(r).replace(/"/g,'&quot;')})">
              ${r.poster_path ? `<img class="work-result-poster" src="https://image.tmdb.org/t/p/w92${r.poster_path}" alt="">` : `<div class="work-result-poster" style="display:flex;align-items:center;justify-content:center;font-size:14px">🎬</div>`}
              <div>
                <div style="font-weight:500">${r.title_ko}</div>
                <div style="font-size:10px;color:var(--muted);font-family:var(--mono)">${r.category==='tv'?'📺 TV':'🎬 영화'} · ${r.year} · tmdb:${r.tmdb_id}</div>
              </div>
            </div>`).join('');
          el.style.display = 'block';
          return;
        }
      }
      /* TMDB 멀티검색: TV + 영화 동시 */
      const [tvRes, mvRes] = await Promise.all([
        fetch(`${TMDB_PROXY}/search/tv?query=${encodeURIComponent(q)}&language=ko-KR`),
        fetch(`${TMDB_PROXY}/search/movie?query=${encodeURIComponent(q)}&language=ko-KR`),
      ]);
      const tvData = await tvRes.json();
      const mvData = await mvRes.json();

      /* TV + 영화 합치고 인기순 정렬 */
      const tvRows = (tvData.results || []).slice(0, 5).map(r => ({
        tmdb_id:    r.id,
        title_ko:   r.name || r.original_name || '',
        title_en:   r.original_name || '',
        poster_path: r.poster_path || '',
        category:   'tv',
        year:       (r.first_air_date || '').slice(0, 4),
        popularity: r.popularity || 0,
      }));
      const mvRows = (mvData.results || []).slice(0, 5).map(r => ({
        tmdb_id:    r.id,
        title_ko:   r.title || r.original_title || '',
        title_en:   r.original_title || '',
        poster_path: r.poster_path || '',
        category:   'movie',
        year:       (r.release_date || '').slice(0, 4),
        popularity: r.popularity || 0,
      }));

      const rows = [...tvRows, ...mvRows]
        .sort((a, b) => b.popularity - a.popularity)
        .slice(0, 10);

      if (!rows.length) {
        el.innerHTML = '<div style="padding:12px 16px;font-size:13px;color:var(--muted)">검색 결과 없음</div>';
        el.style.display = 'block';
        return;
      }

      el.innerHTML = rows.map(r => `
        <div class="work-result-item" onclick="selectWork(${JSON.stringify(r).replace(/"/g,'&quot;')})">
          ${r.poster_path
            ? `<img class="work-result-poster" src="https://image.tmdb.org/t/p/w92${r.poster_path}" alt="">`
            : `<div class="work-result-poster" style="display:flex;align-items:center;justify-content:center;font-size:14px">🎬</div>`
          }
          <div>
            <div style="font-weight:500">${r.title_ko}</div>
            <div style="font-size:10px;color:var(--muted);font-family:var(--mono)">${r.category==='tv'?'📺 TV':'🎬 영화'} · ${r.year} · tmdb:${r.tmdb_id}</div>
          </div>
        </div>`).join('');
      el.style.display = 'block';
    } catch(e) {
      console.error('작품검색 오류:', e);
    }
  }, 400);
}

function selectWork(r) {
  selectedWorkData = r;
  document.getElementById('workSearchInp').value = r.title_ko;
  document.getElementById('workSearchResults').style.display = 'none';
  document.getElementById('selectedWork').textContent = `✅ ${r.title_ko} (tmdb:${r.tmdb_id})`;
  document.getElementById('btnRegister').disabled = !ytVideoData;
}

/* 해외반응 등록 */
async function registerReaction() {
  if (!ytVideoData || !selectedWorkData) {
    showToast('영상과 작품을 모두 선택해주세요', 'err'); return;
  }
  try {
    const body = {
      tmdb_id:      selectedWorkData.tmdb_id,
      title_ko:     selectedWorkData.title_ko,
      poster_path:  selectedWorkData.poster_path || '',
      video_id:     ytVideoData.video_id,
      video_title:  ytVideoData.video_title,
      custom_title: document.getElementById('customTitleInp')?.value.trim() || ytVideoData.video_title,
      channel_name: ytVideoData.channel_name,
      thumbnail:    ytVideoData.thumbnail,
      view_count:   ytVideoData.view_count,
      like_count:   ytVideoData.like_count,
      published_at: ytVideoData.published_at,
    };
    const res  = await fetch(`${API}/admin/reactions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify(body),
    });
    const json = await res.json();
    if (json.ok) {
      showToast(`✅ "${selectedWorkData.title_ko}" 해외반응 등록 완료!`, 'ok');
      /* 초기화 */
      document.getElementById('ytUrlInp').value = '';
      document.getElementById('customTitleInp').value = '';
      document.getElementById('ytPreview').classList.remove('show');
      document.getElementById('workSearchInp').value = '';
      document.getElementById('selectedWork').textContent = '';
      document.getElementById('btnRegister').disabled = true;
      ytVideoData = null; selectedWorkData = null;
      loadReactions();
    } else {
      showToast('등록 실패: ' + json.message, 'err');
    }
  } catch(e) {
    showToast('오류: ' + e.message, 'err');
  }
}

/* 등록된 해외반응 목록 로드 */
async function loadReactions() {
  const el = document.getElementById('reactionList');
  el.innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const res  = await fetch(`${API}/reactions`);
    const json = await res.json();
    const data = json.data || [];
    document.getElementById('reactionStat').textContent = `총 ${data.length}개`;
    if (!data.length) {
      el.innerHTML = '<div class="empty">등록된 해외반응이 없습니다<br><small style="color:var(--muted);font-size:12px">위에서 YouTube URL을 입력해 등록해주세요</small></div>';
      return;
    }
    el.innerHTML = data.map(r => `
      <div class="reaction-card" id="rc_${r.id}">
        <div class="rc-thumb">
          <img src="${r.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none'">
          <span class="rc-platform">YouTube</span>
          ${r.is_featured
            ? '<span class="rc-manual" style="background:rgba(240,180,41,.9);color:#000">⭐ 메인</span>'
            : r.is_manual ? '<span class="rc-manual">수동</span>' : '<span class="rc-manual" style="background:rgba(52,211,153,.9)">자동</span>'}
        </div>
        <div class="rc-body">
          <div class="rc-work">🎬 ${r.title_ko || 'tmdb:'+r.tmdb_id}</div>
          <div class="rc-title">
            ${r.custom_title || r.video_title}
            ${r.custom_title && r.custom_title !== r.video_title
              ? '<span style="font-size:9px;color:var(--accent);margin-left:4px;font-family:var(--mono)">수정됨</span>' : ''}
          </div>
          <div class="rc-meta">
            <span>📺 ${r.channel_name}</span>
            ${r.view_count ? `<span>👁 ${Number(r.view_count).toLocaleString()}</span>` : ''}
          </div>
        </div>
        <div class="rc-footer" style="flex-wrap:wrap;gap:4px">
          <button class="btn-rc-del"
            onclick="deleteReaction(${r.id},'${(r.custom_title||r.video_title||'').replace(/'/g,'').slice(0,20)}')">
            🗑 삭제
          </button>
          <button class="btn-rc-del" style="background:rgba(55,138,221,.1);color:#378ADD;border-color:rgba(55,138,221,.3)"
            onclick="editReaction(${r.id},'${(r.custom_title||r.video_title||'').replace(/'/g,'')}')">
            ✏ 수정
          </button>
          <button class="btn-rc-del"
            style="${r.is_featured
              ? 'background:rgba(240,180,41,.2);color:#c89a10;border-color:rgba(240,180,41,.4)'
              : 'background:rgba(52,211,153,.1);color:var(--green);border-color:rgba(52,211,153,.3)'}"
            onclick="setFeatured(${r.id},${r.is_featured?1:0})">
            ${r.is_featured ? '⭐ 메인해제' : '⭐ 메인'}
          </button>
          <a href="https://youtube.com/watch?v=${r.video_id}" target="_blank"
            style="font-size:11px;color:var(--muted2);font-family:var(--mono);margin-left:auto;text-decoration:none;align-self:center">↗</a>
        </div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty">오류: ${e.message}</div>`;
  }
}

/* 해외반응 제목 수정 */
async function editReaction(id, currentTitle) {
  const newTitle = prompt('게시판 제목을 수정하세요:', currentTitle);
  if (newTitle === null) return;           // 취소
  if (!newTitle.trim()) { showToast('제목을 입력해주세요', 'err'); return; }
  try {
    const res  = await fetch(`${API}/admin/reactions/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ custom_title: newTitle.trim() }),
    });
    const json = await res.json();
    if (json.ok) { showToast('제목이 수정됐습니다', 'ok'); loadReactions(); }
    else showToast('수정 실패: ' + json.message, 'err');
  } catch(e) { showToast('오류: ' + e.message, 'err'); }
}

/* 메인 영상 지정 / 해제 */
async function setFeatured(id, isFeatured) {
  if (isFeatured) {
    // 이미 메인 → 해제 (is_featured=0으로 직접 PATCH)
    if (!confirm('메인 지정을 해제할까요?')) return;
    try {
      await fetch(`${API}/admin/reactions/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ is_featured_off: true }),
      });
      showToast('메인 지정이 해제됐습니다', 'ok'); loadReactions();
    } catch(e) { showToast('오류: ' + e.message, 'err'); }
  } else {
    if (!confirm('이 영상을 게시판 메인으로 지정할까요? 기존 메인 영상은 자동으로 해제됩니다.')) return;
    try {
      const res  = await fetch(`${API}/admin/reactions/${id}/featured`, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}` },
      });
      const json = await res.json();
      if (json.ok) { showToast('⭐ 메인 영상으로 지정됐습니다!', 'ok'); loadReactions(); }
      else showToast('실패: ' + json.message, 'err');
    } catch(e) { showToast('오류: ' + e.message, 'err'); }
  }
}

/* 해외반응 삭제 */
async function deleteReaction(id, title) {
  if (!confirm(`"${title}..." 영상을 삭제할까요?
관련 번역 댓글도 모두 삭제됩니다.`)) return;
  try {
    const res  = await fetch(`${API}/admin/reactions/${id}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` },
    });
    const json = await res.json();
    if (json.ok) { showToast('삭제 완료', 'ok'); loadReactions(); }
    else showToast('삭제 실패: ' + json.message, 'err');
  } catch(e) {
    showToast('오류: ' + e.message, 'err');
  }
}

/* 클릭 시 작품검색 드롭다운 닫기 */
document.addEventListener('click', e => {
  if (!e.target.closest('.yt-link-work'))
    document.getElementById('workSearchResults').style.display = 'none';
});

function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
