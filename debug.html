<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오뜨랑 URL 디버그</title>
<style>
body { background:#0c0c10; color:#ededf0; font-family:'Noto Sans KR',sans-serif; padding:24px; max-width:900px; margin:0 auto; }
h1 { color:#f0b429; margin-bottom:4px; }
.sub { color:#7a7a96; font-size:13px; margin-bottom:24px; }
.status { padding:12px 16px; border-radius:8px; margin-bottom:16px; font-family:monospace; font-size:13px; }
.ok  { background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.3); color:#34d399; }
.err { background:rgba(230,57,70,.1);  border:1px solid rgba(230,57,70,.3);  color:#e63946; }
.info{ background:rgba(55,138,221,.1); border:1px solid rgba(55,138,221,.3); color:#7ec8e3; }
table { width:100%; border-collapse:collapse; margin-bottom:24px; }
th { background:#1a1a24; padding:10px 12px; text-align:left; font-size:12px; color:#7a7a96; font-family:monospace; border-bottom:1px solid rgba(255,255,255,.1); }
td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,.06); font-size:13px; vertical-align:top; }
td:first-child { color:#a0a0bc; font-family:monospace; white-space:nowrap; }
.slug-url { color:#f0b429; font-family:monospace; word-break:break-all; }
.btn { display:inline-block; padding:6px 14px; border-radius:6px; background:#378ADD; color:#fff; text-decoration:none; font-size:12px; margin-left:8px; white-space:nowrap; }
.btn:hover { background:#2a6bb0; }
.btn-red { background:#e63946; }
.btn-red:hover { background:#c41f2c; }
.section { margin-bottom:32px; }
h2 { font-size:16px; color:#a0a0bc; border-bottom:1px solid rgba(255,255,255,.08); padding-bottom:8px; margin-bottom:16px; }
#log { background:#13131a; border:1px solid rgba(255,255,255,.08); border-radius:8px; padding:16px; font-family:monospace; font-size:12px; color:#7a7a96; max-height:200px; overflow-y:auto; white-space:pre-wrap; }
</style>
</head>
<body>

<h1>🔧 오뜨랑 URL 디버그</h1>
<p class="sub">실제 API 데이터로 슬러그 URL을 생성하고 테스트합니다 — <strong>ottrank.kr에서 열어야 합니다</strong></p>

<div id="statusBox" class="status info">⏳ API 데이터 로드 중...</div>

<!-- 섹션 1: API 상태 -->
<div class="section">
  <h2>① API 응답 확인</h2>
  <div id="apiInfo"></div>
</div>

<!-- 섹션 2: 슬러그 URL 목록 -->
<div class="section">
  <h2>② 실제 슬러그 URL (클릭해서 작품 페이지 테스트)</h2>
  <table>
    <thead>
      <tr>
        <th>플랫폼</th>
        <th>순위</th>
        <th>작품명</th>
        <th>tmdb_id</th>
        <th>슬러그 URL</th>
        <th>이동</th>
      </tr>
    </thead>
    <tbody id="urlTable"></tbody>
  </table>
</div>

<!-- 섹션 3: _redirects 테스트 -->
<div class="section">
  <h2>③ _redirects rewrite 테스트</h2>
  <p style="font-size:13px;color:#7a7a96;margin-bottom:12px">아래 슬러그 URL에 직접 접근했을 때 title.html이 로드되는지 확인합니다</p>
  <div id="redirectTest"></div>
</div>

<!-- 섹션 4: 로그 -->
<div class="section">
  <h2>④ 실행 로그</h2>
  <div id="log"></div>
</div>

<script>
const API = 'https://ottrank-api.tdidream.workers.dev';
const IMG = 'https://image.tmdb.org/t/p/w500';
const PC  = {netflix:'넷플릭스',tving:'티빙',disney:'디즈니+',coupang:'쿠팡플레이',wavve:'웨이브',boxoffice:'박스오피스'};
const CC  = {netflix:'#e50914',tving:'#ff153c',disney:'#06b6d4',coupang:'#1ac44d',wavve:'#0070f3'};

function log(msg){ const el=document.getElementById('log'); el.textContent+=msg+'\n'; el.scrollTop=el.scrollHeight; }

function makeSlug(title){
  return (title||'').replace(/\s+/g,'-').replace(/[^\uAC00-\uD7A3\uA960-\uA97F\u1100-\u11FF\u3130-\u318F\u0041-\u005A\u0061-\u007A\u0030-\u0039\-]/g,'') || 'work';
}

function buildSlugUrl(row){
  const title  = row.title_ko || row.title_en || 'work';
  const season = row.season || 1;
  const year   = row.release_year || new Date().getFullYear();
  const tid    = row.tmdb_id;
  const slug   = makeSlug(title);
  return { url: `/title/${slug}-${season}${year}${tid}`, slug, title, season, year, tid };
}

async function main(){
  log('API 호출 시작: ' + API + '/rankings');
  
  try {
    const res  = await fetch(`${API}/rankings`);
    const json = await res.json();
    log(`API 응답: ok=${json.ok}, data 건수=${(json.data||[]).length}`);

    if(!json.ok || !json.data?.length){
      document.getElementById('statusBox').className='status err';
      document.getElementById('statusBox').textContent='❌ API 응답 이상: ' + JSON.stringify(json).slice(0,200);
      return;
    }

    document.getElementById('statusBox').className='status ok';
    document.getElementById('statusBox').textContent=`✅ API 정상 — 총 ${json.data.length}개 랭킹 데이터`;

    // API 요약
    const cats = {}, plats = {};
    json.data.forEach(r => {
      cats[r.category]   = (cats[r.category]||0)+1;
      plats[r.platform]  = (plats[r.platform]||0)+1;
    });
    document.getElementById('apiInfo').innerHTML = `
      <div class="status ok" style="white-space:pre;font-size:12px">카테고리: ${JSON.stringify(cats)}
플랫폼:   ${JSON.stringify(plats)}
첫 항목:  ${JSON.stringify(json.data[0])}</div>`;

    // 상위 3개씩 슬러그 URL 생성
    const seen = new Set();
    const rows = json.data
      .filter(r => r.tmdb_id && !seen.has(r.platform+'_'+r.rank) && seen.add(r.platform+'_'+r.rank))
      .filter(r => r.rank <= 3)
      .slice(0, 20);

    const tbody = document.getElementById('urlTable');
    const testUrls = [];

    rows.forEach(row => {
      const { url, slug, title, season, year, tid } = buildSlugUrl(row);
      const fullUrl = `https://ottrank.kr${url}`;
      testUrls.push({ url, fullUrl, title });
      log(`생성: ${title} → ${url}`);
      tbody.innerHTML += `
        <tr>
          <td><span style="color:${CC[row.platform]||'#888'};font-weight:600">${PC[row.platform]||row.platform}</span></td>
          <td style="color:#f0b429">${row.rank}위</td>
          <td>${title}</td>
          <td style="color:#7a7a96">${tid}</td>
          <td class="slug-url">${url}</td>
          <td>
            <a class="btn" href="${fullUrl}" target="_blank">열기</a>
            <a class="btn btn-red" href="${fullUrl}" >이 탭</a>
          </td>
        </tr>`;
    });

    // _redirects 테스트: fetch로 슬러그 URL 접근해서 200 뜨는지 확인
    const testRow = testUrls[0];
    if(testRow){
      log(`\n_redirects 테스트: ${testRow.url}`);
      const rdiv = document.getElementById('redirectTest');
      try {
        const tr = await fetch(testRow.url, {method:'HEAD'});
        log(`HEAD ${testRow.url} → ${tr.status} ${tr.statusText}`);
        const ok = tr.status === 200;
        rdiv.innerHTML = `
          <div class="status ${ok?'ok':'err'}">
            ${ok ? '✅' : '❌'} <code>${testRow.url}</code> → HTTP ${tr.status}<br>
            ${ok ? '_redirects rewrite 정상 작동 중!' : '404 또는 리다이렉트 — _redirects가 아직 반영 안 됐을 수 있습니다'}
          </div>
          <p style="font-size:12px;color:#7a7a96;margin-top:8px">
            직접 테스트: <a href="${testRow.url}" style="color:#f0b429">${testRow.url}</a> 클릭해서 작품 페이지가 뜨면 ✅
          </p>`;
      } catch(e) {
        log(`HEAD 오류: ${e.message}`);
        rdiv.innerHTML = `<div class="status err">❌ fetch 실패: ${e.message}</div>`;
      }
    }

  } catch(e) {
    log('오류: ' + e.message);
    document.getElementById('statusBox').className='status err';
    document.getElementById('statusBox').textContent='❌ API 오류: ' + e.message;
  }
}

main();
</script>
</body>
</html>
